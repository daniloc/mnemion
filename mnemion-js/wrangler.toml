name = "mnemion"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]


[vars]
WORKER_HOST = "your-worker.workers.dev"

# KV namespace for OAuth tokens
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_ME"

# Session DO (McpAgent, one per MCP session)
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SessionDO"

# Hive DO (per-user data storage)
[[durable_objects.bindings]]
name = "MNEMION_HIVE"
class_name = "HiveDO"

# Workers AI (embedding generation)
[ai]
binding = "AI"

# Vectorize (semantic search index)
[[vectorize]]
binding = "VECTORIZE"
index_name = "mnemion-vectors"

# Migration: rename old class, add new ones
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CambiumServer"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "CambiumServer", to = "CambiumSession"}]
new_sqlite_classes = ["CambiumStore"]

[[migrations]]
tag = "v3"
renamed_classes = [{from = "CambiumSession", to = "SessionDO"}, {from = "CambiumStore", to = "StoreDO"}]

[[migrations]]
tag = "v4"
renamed_classes = [{from = "StoreDO", to = "HiveDO"}]

# === Test environment (federation peer) ===
[env.test]
name = "mnemion-test"

[env.test.vars]
WORKER_HOST = "your-test-worker.workers.dev"

[[env.test.kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_ME"

[[env.test.durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SessionDO"

[[env.test.durable_objects.bindings]]
name = "MNEMION_HIVE"
class_name = "HiveDO"

[[env.test.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO", "HiveDO"]

# === House environment (friend's instance) ===
[env.house]
name = "mnemion-house"

[env.house.vars]
WORKER_HOST = "your-other-worker.workers.dev"

[[env.house.kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_ME"

[[env.house.durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SessionDO"

[[env.house.durable_objects.bindings]]
name = "MNEMION_HIVE"
class_name = "HiveDO"

[env.house.ai]
binding = "AI"

[[env.house.vectorize]]
binding = "VECTORIZE"
index_name = "your-other-vectors"

[[env.house.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO", "HiveDO"]

# Import .md files as text modules
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Import compiled client bundles as text (for inlining into SSR HTML)
[[rules]]
type = "Text"
globs = ["**/*.client.txt"]
fallthrough = false
