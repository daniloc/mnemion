name = "mnemion"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Pre-deploy build hook. Runs on every `wrangler deploy` (and in Workers Builds
# for one-click installs): ensures the Vectorize index exists (Vectorize is not
# auto-provisioned), then builds the Svelte client/SSR bundles the worker imports.
[build]
command = "bash scripts/ensure-vectorize.sh; npm run build:pages"


[vars]
# Cold-start fallback only — the runtime prefers the inbound request Host header.
# Used solely by the _system/instance doc when no HTTP request has been observed
# since DO eviction. Safe to omit; defaults to "localhost" when missing.
WORKER_HOST = "your-worker.workers.dev"

# KV namespace for OAuth tokens. No `id` → Cloudflare auto-provisions one named
# after the worker on first deploy and keeps it linked on later deploys. This is
# what lets a one-click "Deploy to Cloudflare" install work with no manual setup.
# (A local `wrangler deploy` writes the resolved id back into this file.)
[[kv_namespaces]]
binding = "OAUTH_KV"

# Session DO (McpAgent, one per MCP session)
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SessionDO"

# Hive DO (per-user data storage)
[[durable_objects.bindings]]
name = "MNEMION_HIVE"
class_name = "HiveDO"

# Workers AI (embedding generation)
[ai]
binding = "AI"

# Vectorize (semantic search index)
[[vectorize]]
binding = "VECTORIZE"
index_name = "mnemion-vectors"

# R2 bucket for document blobs (the bytes; metadata lives in the _documents pattern).
# OPTIONAL — the document store. Mnemion runs fully without it; only file
# upload/serve (/f) is unavailable until enabled. To turn it on:
#   1. Enable R2 on your account: Cloudflare dashboard → Storage & databases → R2.
#   2. Run `npm run enable-documents` — creates the bucket and uncomments the
#      block below for you. Then `npm run deploy`.
# A binding to a non-existent bucket fails deploy, so it ships commented
# out by default — that's what keeps Mnemion deployable without R2.
# [[r2_buckets]]
# binding = "DOCUMENTS"
# bucket_name = "mnemion-documents"

# Migration: rename old class, add new ones
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CambiumServer"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "CambiumServer", to = "CambiumSession"}]
new_sqlite_classes = ["CambiumStore"]

[[migrations]]
tag = "v3"
renamed_classes = [{from = "CambiumSession", to = "SessionDO"}, {from = "CambiumStore", to = "StoreDO"}]

[[migrations]]
tag = "v4"
renamed_classes = [{from = "StoreDO", to = "HiveDO"}]

# === Test environment (federation peer, Auth.DEV mode) ===
# Optional. Used as a second hive for testing federation against the main env.
# Provision with: wrangler deploy --env test (and create its own OAUTH_KV namespace).
[env.test]
name = "mnemion-test"

[env.test.vars]
WORKER_HOST = "your-test-worker.workers.dev"

[[env.test.kv_namespaces]]
binding = "OAUTH_KV"

[[env.test.durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SessionDO"

[[env.test.durable_objects.bindings]]
name = "MNEMION_HIVE"
class_name = "HiveDO"

# Document store — uncomment after enabling R2 (see the note in the default env).
# [[env.test.r2_buckets]]
# binding = "DOCUMENTS"
# bucket_name = "mnemion-test-documents"

[[env.test.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO", "HiveDO"]

# Import .md files as text modules
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Import compiled client bundles as text (for inlining into SSR HTML)
[[rules]]
type = "Text"
globs = ["**/*.client.txt"]
fallthrough = false
