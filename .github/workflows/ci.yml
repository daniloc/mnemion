name: CI

# The self-enforcing declarations in this repo (write-class totality, egress
# sensitivity, the trust-capability split, the tools SSOT) only protect the
# system if their oracles actually run before merge. This workflow is that gate:
# the unit suite + the project's ratchet checks + spec/code coherence, plus a
# live MCP smoke that drives the real /mcp agent surface end to end.

on:
  push:
    branches: ["**"]
  pull_request:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The wrangler [build] hook (scripts/build-hook.sh) skips the deploy-only work
# (Vectorize provisioning + the React SPA build, both network/account-bound) when
# DEV is set in the SHELL. --var only sets the worker runtime var, not the shell,
# so set it here for every job — keeps the build offline and account-free in CI.
env:
  DEV: "true"

defaults:
  run:
    working-directory: mnemion-js

jobs:
  checks:
    name: tests · ratchets · coherence
    runs-on: ubuntu-latest
    # The unit suite reaches the REAL Workers AI + Vectorize bindings (remote = true
    # in wrangler.toml — neither has a local simulator). The vitest pool opens a
    # remote proxy session to the account, which is non-interactive in CI and so
    # needs an API token (Workers AI:Read + Vectorize:Edit + Workers Scripts:Edit +
    # Account Settings:Read) plus the account id. Absent these the pool can't start.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # wrangler + coherence require Node >= 22
          cache: npm
          cache-dependency-path: mnemion-js/package-lock.json

      - run: npm ci

      # The worker entry statically imports the render-fragment bundle from
      # dist/ (gitignored), so it must exist before vitest loads the worker.
      - name: Build worker page bundles
        run: npm run build:pages

      # The React SPA (dist/web) is gitignored AND the wrangler build hook skips
      # it under DEV=true, so it isn't built above. routes.test.ts drives the
      # ASSETS-served SPA shell (GET / and unknown browser routes must fall back
      # to dist/web/index.html), which 404s without this build. Build it here.
      - name: Build web SPA
        run: npm run build:web

      # Pure-TypeScript gate — the Vite/esbuild build only transpiles, it never
      # type-checks. Two scoped tsconfigs: the worker (excludes the browser render
      # fragment) and src/pages (DOM lib). `npm run types` refreshes the generated
      # Env first so the check sees current bindings.
      - name: Typecheck
        run: |
          npm run types
          npm run typecheck

      # Point the VECTORIZE binding at a DEDICATED CI index for this run only.
      # The remote Vectorize index is real, account-side state — isolatedStorage
      # rolls back DO SQLite between tests but NOT remote upserts, so running
      # against prod (mnemion-vectors) would leave test vectors in the live index
      # and let KNN reads see cross-contaminated neighbors. The edit is on the
      # ephemeral checkout only; the committed wrangler.toml stays prod-correct
      # for deploys. (Create once: wrangler vectorize create mnemion-ci-vectors
      # --dimensions=768 --metric=cosine — matches @cf/baai/bge-base-en-v1.5.)
      - name: Isolate Vectorize index (CI)
        run: sed -i 's/index_name = "mnemion-vectors"/index_name = "mnemion-ci-vectors"/' wrangler.toml

      # Unit suite — runs in the real workerd runtime (vitest-pool-workers),
      # including the totality oracles (policy / egress / context-capability /
      # tools-ssot / served-bearer-gating).
      - name: Test
        run: npm test

      # Ratchets: no new conventions, no new raw SQL interpolation sites, and the
      # trust atlas stays in sync with the boundary claims (no managed chokepoint
      # left off the atlas, no dangling edge).
      - name: Convention ratchet
        run: npm run conventions:check
      - name: Injection-lint ratchet
        run: npm run injection-lint:check
      - name: Atlas drift
        run: npm run atlas:check

      # Specs must still match the code (boundary ratchet anchors invariants to
      # chokepoint + oracle claims).
      - name: Coherence
        run: npm run coherence:verify

  mcp-smoke:
    name: live /mcp surface
    runs-on: ubuntu-latest
    # `wrangler dev` eagerly opens the remote proxy session for the remote = true
    # AI + Vectorize bindings AT BOOT — even under SKIP_EMBED (which only stops the
    # worker from CALLING them), so it won't start without account auth. Give this
    # job the same credentials; the proxy session is cheap and SKIP_EMBED keeps
    # actual AI/Vectorize usage at zero.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mnemion-js/package-lock.json

      - run: npm ci

      # wrangler dev serves [assets] from ./dist/web (the React SPA, gitignored);
      # under DEV=true the build hook skips the SPA build, so build it explicitly
      # or wrangler refuses to boot ("assets.directory … does not exist").
      - name: Build web SPA
        run: npm run build:web

      # Start a local dev worker (DEV mode, seeded, embeddings skipped via
      # SKIP_EMBED — the worker runs locally, but the remote = true bindings still
      # need account auth to open their proxy at boot), wait for it, then drive the real
      # MCP protocol path: OAuth token -> SessionDO -> Zod -> consent gate ->
      # HiveDO. This is the surface that can pass /api+RPC tests yet break
      # through MCP, so it gets its own end-to-end check. Worker + smoke share
      # one shell so the backgrounded worker is reliably cleaned up.
      - name: MCP smoke
        run: |
          npx wrangler dev --var DEV:true --var DEV_SEED:true --var SKIP_EMBED:1 --port 4281 > /tmp/worker.log 2>&1 &
          WPID=$!
          trap "kill $WPID 2>/dev/null || true" EXIT
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4281/mcp || true)
            case "$code" in 2*|3*|4*) echo "worker ready (HTTP $code) after ${i}s"; break;; esac
            if [ "$i" -eq 120 ]; then echo "worker never became ready"; cat /tmp/worker.log; exit 1; fi
            sleep 1
          done
          MCP_URL=http://127.0.0.1:4281/mcp npm run mcp:smoke || { echo '--- worker.log ---'; cat /tmp/worker.log; exit 1; }
